name: Deploy Riversoft Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            dist/ "$SERVER_USER@$SERVER_HOST:/var/www/riversoft/"

          rsync -az --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude .git \
            --exclude database.sqlite \
            --exclude server/database.sqlite \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            server/ package.json package-lock.json ecosystem.config.cjs \
            "$SERVER_USER@$SERVER_HOST:/var/www/riversoft-api/"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "cd /var/www/riversoft-api && mkdir -p /home/deploy/riversoft-data && npm install --omit=dev --legacy-peer-deps && npm install sqlite3 --build-from-source --legacy-peer-deps --no-save && npx -y pm2 startOrReload ecosystem.config.cjs && npx -y pm2 save && sleep 3 && (curl -sS -o /dev/null http://127.0.0.1:3001/api/me || (npx -y pm2 logs riversoft-api --lines 80 --nostream; exit 1))"
